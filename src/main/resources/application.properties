server.port=8080
# Sửa lại URL trỏ về PostgreSQL (Cổng 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/CafeWork

# Tên đăng nhập và mật khẩu DB của bệ hạ (Hãy điền đúng mật khẩu của ngài)
spring.datasource.username=postgres
spring.datasource.password=Trunghl3

# Trả lại Driver và Dialect cho PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=jdbc:postgresql://localhost:5432/CafeWork?stringtype=unspecified

# Cấu hình Mail để gửi OTP (Cần điền thông tin thật để gửi được email)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
